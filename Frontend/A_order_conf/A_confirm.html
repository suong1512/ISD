<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Confirmation - Order Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../conf_shared/confirm_shared.css">
    <link rel="stylesheet" href="A_conf.css">
</head>

<body>

    <nav class="main-header">
        <div class="header-content">
            <div class="logo">
                <img src="../img/logo.jpeg" alt="Logo" class="logo-img">
                <span>Order Management</span>
            </div>
            <ul class="nav-links">
                <li><a href="../A_dashboard/A_dash.html" style="text-decoration: none; color: inherit;">Dashboard</a>
                </li>
                <li class="active">Confirm Order</li>
                <li><a href="../list/O_list.html" style="text-decoration: none; color: inherit;">Order List</a></li>

            </ul>
            <div class="user-actions">
                <i class="fas fa-search"></i>
                <i class="fas fa-bell"></i>

                <div class="user-profile-container">
                    <div class="user-avatar" id="avatarTrigger">AD</div>

                    <div class="user-dropdown" id="userDropdown">
                        <div class="dropdown-header">
                            <strong id="dropdownName">Admin</strong>
                            <span id="dropdownDept">Administrator</span>
                        </div>
                        <hr>
                        <a href="#" class="dropdown-item">
                            <i class="fas fa-user-circle"></i> My Profile
                        </a>
                        <a href="#" class="dropdown-item">
                            <i class="fas fa-cog"></i> Settings
                        </a>
                        <hr>
                        <a href="#" onclick="logout(); return false;" class="dropdown-item logout-item">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="breadcrumb-wrapper">
        <div class="breadcrumb-content">
            <a href="../A_dashboard/A_dash.html" class="back-link">Dashboard</a>
            > Confirm Order
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="page-header">
                <div>
                    <h1>Admin Confirmation</h1>
                    <p class="subtitle">Review and authorize pending sales orders before fulfillment.</p>
                </div>
                <span class="stats-badge" id="pendingCount">0 Pending</span>
            </div>
        </div>

        <div class="order-grid" id="orderGrid"></div>
    </div>

    <script src="../api.js"></script>
    <script src="../auth.js"></script>
    <script>
        // Check admin authentication
        if (requireAuth('ADMIN')) {
            console.log('Access granted to Admin Panel');
        }
    </script>
    <script src="A_conf.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Setup User Dropdown
            const avatar = document.getElementById('avatarTrigger');
            const dropdown = document.getElementById('userDropdown');
            if(avatar && dropdown) {
                avatar.addEventListener('click', function (e) {
                    e.stopPropagation();
                    dropdown.classList.toggle('active');
                });
                document.addEventListener('click', function (e) {
                    if (!avatar.contains(e.target) && !dropdown.contains(e.target)) {
                        dropdown.classList.remove('active');
                    }
                });
            }

            // Load user data
            const initials = localStorage.getItem('userInitials');
            const fullName = localStorage.getItem('currentUser');
            const avatarElement = document.getElementById('avatarTrigger');
            const dropdownName = document.querySelector('.dropdown-header strong');

            if (initials && avatarElement) avatarElement.innerText = initials;
            if (fullName && dropdownName) dropdownName.innerText = fullName;
        });
    </script>
</body>

</html>
