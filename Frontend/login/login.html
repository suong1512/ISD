<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Order Tracking System</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <a href="../gate/gate.html" class="back-link">
        <i class="fas fa-arrow-left"></i> <span>Back</span>
    </a>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i id="deptIcon" class="fas fa-handshake"></i>
                <h1 id="deptTitle">Sale Department</h1>
                <p>Please enter your details to sign in</p>
            </div>
            
            <div id="loginError" class="login-error" style="display:none;"></div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="username" placeholder="Enter email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>
    <script src="login.js"></script>

</body>
</html>
